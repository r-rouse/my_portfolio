[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  # The chat function reads the knowledge base from content/*.md at runtime
  # (see lib/rag/loadDocuments.ts). Bundle those files with the function.
  included_files = ["content/**"]

# SPA fallback. Function routes (e.g. /api/chat via config.path in
# netlify/functions/chat.mts) are matched before this catch-all.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
